<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Connexion Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #2D2D2D;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .info-box {
            background: #E3F2FD;
            border-left: 4px solid #1976D2;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 4px;
        }

        .info-box strong {
            color: #1976D2;
            display: block;
            margin-bottom: 8px;
        }

        .info-box code {
            background: #fff;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2D2D2D;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #4DB896;
            box-shadow: 0 0 0 3px rgba(77, 184, 150, 0.1);
        }

        button {
            width: 100%;
            background: #4DB896;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: #3da07d;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(77, 184, 150, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .logs {
            margin-top: 20px;
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-left: 3px solid #4DB896;
            padding-left: 10px;
        }

        .log-error {
            border-left-color: #dc3545;
            color: #dc3545;
        }

        .log-success {
            border-left-color: #28a745;
            color: #28a745;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 Test Connexion Admin</h1>
        <p class="subtitle">Cars Vision Auto - Test de connexion</p>

        <div class="info-box">
            <strong>📋 Identifiants par défaut:</strong>
            <div>Email: <code>admin@carsvisionauto.cm</code></div>
            <div>Mot de passe: <code>Admin@2026</code></div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input type="email" id="email" value="admin@carsvisionauto.cm" required
                    placeholder="admin@carsvisionauto.cm">
            </div>

            <div class="form-group">
                <label for="mot_de_passe">🔒 Mot de passe</label>
                <input type="password" id="mot_de_passe" value="Admin@2026" required placeholder="Admin@2026">
            </div>

            <button type="submit" id="submitBtn">Se connecter</button>
        </form>

        <div id="result"></div>
        <div id="logs" class="logs" style="display: none;"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('mot_de_passe');
        const submitBtn = document.getElementById('submitBtn');
        const resultDiv = document.getElementById('result');
        const logsDiv = document.getElementById('logs');

        let logs = [];

        function addLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            logs.push({ timestamp, message, type });
            updateLogsDisplay();
            console.log(`[${timestamp}] ${message}`);
        }

        function updateLogsDisplay() {
            logsDiv.style.display = 'block';
            logsDiv.innerHTML = logs.map(log => {
                const className = log.type === 'error' ? 'log-error' :
                    log.type === 'success' ? 'log-success' : '';
                return `<div class="log-entry ${className}">[${log.timestamp}] ${log.message}</div>`;
            }).join('');
            logsDiv.scrollTop = logsDiv.scrollHeight;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value;
            const mot_de_passe = passwordInput.value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion en cours...';
            resultDiv.innerHTML = '';
            logs = [];

            addLog('🔍 Début du test de connexion');
            addLog(`📧 Email: ${email}`);
            addLog(`🔑 Mot de passe: ${'*'.repeat(mot_de_passe.length)}`);
            addLog(`🌐 API URL: ${API_URL}`);

            try {
                // Test 1: Vérifier que le backend est accessible
                addLog('📡 Test 1: Vérification du backend...');
                try {
                    const healthResponse = await fetch(`${API_URL.replace('/api', '')}/api/health`);
                    if (healthResponse.ok) {
                        addLog('✅ Backend accessible', 'success');
                    } else {
                        addLog('⚠️  Backend répond mais avec erreur', 'error');
                    }
                } catch (err) {
                    addLog('❌ Backend non accessible - Démarrez le backend!', 'error');
                    throw new Error('Backend non accessible. Exécutez: cd Car_Vision && npm run dev');
                }

                // Test 2: Tentative de connexion
                addLog('🔐 Test 2: Tentative de connexion...');
                const loginData = {
                    email: email,
                    mot_de_passe: mot_de_passe
                };
                addLog(`📤 Données envoyées: ${JSON.stringify(loginData)}`);

                const loginResponse = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(loginData)
                });

                addLog(`📥 Réponse reçue: Statut ${loginResponse.status}`);

                const responseData = await loginResponse.json();
                addLog(`📦 Données: ${JSON.stringify(responseData, null, 2)}`);

                if (loginResponse.ok) {
                    addLog('✅ CONNEXION RÉUSSIE!', 'success');

                    resultDiv.innerHTML = `
                        <div class="result success">
                            <strong>✅ Connexion réussie!</strong><br><br>
                            <strong>Token reçu:</strong><br>
                            <code style="word-break: break-all; font-size: 10px;">${responseData.token ? responseData.token.substring(0, 50) + '...' : 'N/A'}</code><br><br>
                            <strong>Utilisateur:</strong><br>
                            ${responseData.utilisateur ? `
                                • Nom: ${responseData.utilisateur.prenom} ${responseData.utilisateur.nom}<br>
                                • Email: ${responseData.utilisateur.email}<br>
                                • Rôle: ${responseData.utilisateur.role}
                            ` : 'N/A'}
                        </div>
                    `;
                } else {
                    addLog(`❌ Échec de connexion: ${responseData.message}`, 'error');

                    resultDiv.innerHTML = `
                        <div class="result error">
                            <strong>❌ Échec de connexion</strong><br><br>
                            <strong>Message:</strong> ${responseData.message}<br><br>
                            ${responseData.tentatives_restantes ?
                            `<strong>Tentatives restantes:</strong> ${responseData.tentatives_restantes}` :
                            ''}
                        </div>
                    `;
                }

            } catch (error) {
                addLog(`❌ ERREUR: ${error.message}`, 'error');

                resultDiv.innerHTML = `
                    <div class="result error">
                        <strong>❌ Erreur réseau!</strong><br><br>
                        ${error.message}<br><br>
                        <small><strong>Vérifications:</strong><br>
                        1. Le backend est-il démarré? (npm run dev dans Car_Vision)<br>
                        2. Le backend tourne-t-il sur http://localhost:5000?<br>
                        3. Y a-t-il des erreurs dans le terminal du backend?</small>
                    </div>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        });

        // Pré-remplir et afficher les logs au chargement
        addLog('📝 Formulaire pré-rempli avec les identifiants admin');
        addLog('💡 Cliquez sur "Se connecter" pour tester');
    </script>
</body>

</html>
